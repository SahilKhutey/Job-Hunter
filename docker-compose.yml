version: "3.9"

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - hunter-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - hunter-net

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - hunter-net

  redis:
    image: redis:7-alpine
    networks:
      - hunter-net

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hunteros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hunter-net

networks:
  hunter-net:
    driver: bridge

volumes:
  postgres_data:
