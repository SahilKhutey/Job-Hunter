version: "3.9"

services:
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hunter-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - hunter-net

  frontend:
    build: ./frontend
    restart: always
    # Ports moved to gateway
    env_file:

      - .env
    depends_on:
      - api
    networks:
      - hunter-net

  gateway:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - hunter-net

  redis:

    image: redis:7-alpine
    networks:
      - hunter-net

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hunteros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hunter-net

networks:
  hunter-net:
    driver: bridge

volumes:
  postgres_data:
