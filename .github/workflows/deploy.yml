name: CI/CD Pipeline

on:
  push:
    branches:
      - master # Our primary branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Backend
      - name: Build and Push Backend API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hunteros-api:latest

      # Build and Push Worker
      - name: Build and Push Celery Worker
        uses: docker/build-push-action@v5
      # 📤 Push Images
      - name: Push images
        run: |
          docker tag hunteros-api ${{ secrets.DOCKER_USERNAME }}/hunteros-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hunteros-api:latest

          docker tag hunteros-worker ${{ secrets.DOCKER_USERNAME }}/hunteros-worker:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hunteros-worker:latest

          docker tag hunteros-frontend ${{ secrets.DOCKER_USERNAME }}/hunteros-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/hunteros-frontend:latest

      # 🛡️ Run System Audit
      - name: Run System Audit
        run: |
          cd audit
          pip install -r requirements.txt
          bandit -r ../backend/
          safety check

      # 🔍 Secret Leak Detection
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 Container Security Scan
      - name: Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/hunteros-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'


      # 🚀 Deploy to Server (SSH)
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/HunterOS
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
