global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "hunteros-api"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "hunteros-worker"
    static_configs:
      - targets: ["worker:8000"] # If worker exposes metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
